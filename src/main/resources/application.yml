server:
  address: 127.0.0.1
  port: 8080

logging:
  structured:
    format:
      console: logstash

assistant:
  schema:
    location: classpath:schema.graphql
  logging:
    # Opt in only when complete schemas, prompts, operations, variables, AI responses,
    # and tool inputs/outputs are safe to retain in application logs.
    full-content-enabled: false
  ai:
    provider: ollama
    request-timeout: 60s
    warm-response-target: 30s
    ollama:
      base-url: http://localhost:11434
      model: qwen3:8b
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: gpt-5.4-mini
